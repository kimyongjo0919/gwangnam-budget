<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학과 예산관리 | 광남고등학교</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2e4a;
    --navy-light: #243d5e;
    --blue: #2563a8;
    --blue-light: #3b82c4;
    --accent: #e8a020;
    --accent-light: #f5c04a;
    --green: #2d7a4f;
    --green-light: #e8f5ee;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --bg: #f0f4f9;
    --card: #ffffff;
    --border: #d0dae8;
    --text: #1a2e4a;
    --text-mid: #4a5e78;
    --text-light: #8a9bb0;
    --shadow: 0 2px 12px rgba(26,46,74,0.08);
    --shadow-lg: 0 8px 32px rgba(26,46,74,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 60%, var(--blue) 100%);
    color: white;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(26,46,74,0.3);
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-badge {
    background: var(--accent);
    color: var(--navy);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .header-title h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header-sub {
    font-size: 11px;
    opacity: 0.7;
    margin-top: 2px;
  }
  .sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    opacity: 0.8;
  }
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── 탭 ── */
  .tab-bar {
    background: var(--card);
    border-bottom: 2px solid var(--border);
    display: flex;
    padding: 0 24px;
    gap: 4px;
    position: sticky;
    top: 64px;
    z-index: 99;
    box-shadow: var(--shadow);
  }
  .tab-btn {
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-mid);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn:hover { color: var(--blue); }
  .tab-btn.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
    font-weight: 700;
  }
  .tab-icon { font-size: 15px; }

  /* ── 컨텐츠 ── */
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── 카드 ── */
  .card {
    background: var(--card);
    border-radius: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .card-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to right, #f8fafd, var(--card));
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-body { padding: 24px; }

  /* ── 입력 폼 ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group.half { grid-column: span 2; }
  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mid);
    letter-spacing: 0.3px;
  }
  .required::after { content: ' *'; color: var(--red); }
  input, select, textarea {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: white;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(37,99,168,0.1);
  }
  textarea { resize: vertical; min-height: 72px; }

  .btn {
    padding: 11px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    color: white;
    box-shadow: 0 3px 10px rgba(37,99,168,0.3);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 16px rgba(37,99,168,0.4);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-danger {
    background: var(--red-light);
    color: var(--red);
    border: 1px solid #f0c0bb;
  }
  .btn-danger:hover { background: #fce4e1; }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
  .btn-outline {
    background: white;
    color: var(--blue);
    border: 1.5px solid var(--blue);
  }
  .btn-outline:hover { background: #f0f6ff; }

  .form-actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* ── 테이블 ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--navy);
    color: white;
    padding: 11px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  th:first-child { border-radius: 0; }
  td {
    padding: 11px 14px;
    border-bottom: 1px solid #edf2f8;
    vertical-align: middle;
  }
  tr:hover td { background: #f8fafd; }
  tr:last-child td { border-bottom: none; }
  .amount-cell {
    font-weight: 700;
    color: var(--navy);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── 예산현황 ── */
  .budget-sections { display: flex; flex-direction: column; gap: 20px; }

  .section-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 10px 10px 0 0;
    color: white;
  }
  .section-header.blue  { background: linear-gradient(135deg, #1a3a6e, #2563a8); }
  .section-header.orange{ background: linear-gradient(135deg, #7a3010, #c55a11); }
  .section-header.green { background: linear-gradient(135deg, #1a4a2e, #2d7a4f); }
  .section-header.purple{ background: linear-gradient(135deg, #3a1a5e, #6b35a8); }
  .section-header.teal  { background: linear-gradient(135deg, #003d33, #00695c); }

  .section-name { font-size: 14px; font-weight: 700; }
  .section-total {
    font-size: 13px;
    opacity: 0.9;
    display: flex;
    gap: 16px;
  }
  .section-total span { display: flex; align-items: center; gap: 5px; }

  .budget-table { border-radius: 0 0 10px 10px; overflow: hidden; border: 1px solid var(--border); border-top: none; }
  .budget-table table { font-size: 13px; }
  .budget-table th { background: #2a3f5e; font-size: 11px; padding: 9px 14px; }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 140px;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #e0eaf5;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
    background: linear-gradient(to right, #2563a8, #4a9fd4);
  }
  .progress-fill.warn { background: linear-gradient(to right, #e8a020, #f5c04a); }
  .progress-fill.danger { background: linear-gradient(to right, #c0392b, #e74c3c); }
  .pct-text { font-size: 11px; font-weight: 700; color: var(--text-mid); min-width: 36px; }

  .remain-positive { color: var(--green); font-weight: 700; }
  .remain-negative { color: var(--red); font-weight: 700; }

  /* ── 요약 카드 ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .summary-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-light);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .summary-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    font-variant-numeric: tabular-nums;
  }
  .summary-sub { font-size: 12px; color: var(--text-mid); }
  .summary-card.accent { border-left: 4px solid var(--accent); }
  .summary-card.blue   { border-left: 4px solid var(--blue); }
  .summary-card.green  { border-left: 4px solid var(--green); }

  /* ── 태그 ── */
  .tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-blue   { background: #e8f0fc; color: var(--blue); }
  .tag-orange { background: #fef3e2; color: #c55a11; }
  .tag-green  { background: var(--green-light); color: var(--green); }
  .tag-purple { background: #f0e8fc; color: #6b35a8; }
  .tag-teal   { background: #e0f2f1; color: #004D40; }

  /* ── 로딩 / 알림 ── */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(26,46,74,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    backdrop-filter: blur(3px);
  }
  .loading-box {
    background: white;
    border-radius: 16px;
    padding: 32px 40px;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--navy);
    color: white;
    padding: 13px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error   { background: var(--red); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-light);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── 필터 바 ── */
  .filter-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-bar select, .filter-bar input {
    padding: 8px 12px;
    font-size: 13px;
    border-radius: 7px;
  }

  /* ── 모달 ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,46,74,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
    backdrop-filter: blur(3px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 520px;
    box-shadow: var(--shadow-lg);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .summary-grid { grid-template-columns: 1fr; }
    .tab-btn { padding: 12px 12px; font-size: 12px; }
    .main { padding: 16px 12px; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div class="header-title">
    <div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="header-badge">광남고</span>
        <h1>과학과 예산관리</h1>
      </div>
      <div class="header-sub">창의융합과학부 · 2026학년도</div>
    </div>
  </div>
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">연결 중...</span>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('input')" id="tab-input">
    <span class="tab-icon">✏️</span> 지출 입력
  </button>
  <button class="tab-btn" onclick="switchTab('records')" id="tab-records">
    <span class="tab-icon">📋</span> 지출 내역
  </button>
  <button class="tab-btn" onclick="switchTab('budget')" id="tab-budget">
    <span class="tab-icon">📊</span> 예산 현황
  </button>
  <button class="tab-btn" onclick="switchTab('ref')" id="tab-ref">
    <span class="tab-icon">📑</span> 참고사항
  </button>
  <button class="tab-btn" onclick="switchTab('compare')" id="tab-compare">
    <span class="tab-icon">🔍</span> 에듀파인 대조(예산담당자용)
  </button>
</div>

<div class="main">

  <!-- ── 지출 입력 ── -->
  <div class="tab-content active" id="content-input">
    <div class="card">
      <div class="card-header">
        <div class="card-title">✏️ 지출 내역 입력</div>
        <div style="font-size:12px;color:var(--text-light);">* 표시 항목은 필수 입력</div>
      </div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-group">
            <label class="required">날짜</label>
            <input type="date" id="inp-date">
          </div>
          <div class="form-group">
            <label class="required">세부사업</label>
            <select id="inp-section" onchange="updateItems()">
              <option value="">선택</option>
              <option>과학교과활동</option>
              <option>[시보조]고교학점제 운영지원(학업경로설계)</option>
              <option>[자율]미래 역량 함양을 위한 다영역 창의·융합 통합 교육</option>
              <option>[목적]주도성을 키우는 교육과정 선도학교</option>
              <option>[목적]융합교육(STEAM) 클럽 운영</option>
            </select>
          </div>
          <div class="form-group">
            <label class="required">산출내역</label>
            <select id="inp-item">
              <option value="">세부사업을 먼저 선택하세요</option>
            </select>
          </div>
          <div class="form-group">
            <label class="required">금액 (원)</label>
            <input type="number" id="inp-amount" placeholder="0" min="0" step="1000">
          </div>
          <div class="form-group">
            <label class="required">담당자</label>
            <select id="inp-user">
              <option value="">선택</option>
            </select>
          </div>
          <div class="form-group full">
            <label>사용내역</label>
            <textarea id="inp-memo" placeholder="예) 융합과학토론 재료비 구입 (포스트잇, 보드마커 등)"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-outline" onclick="resetForm()">🔄 초기화</button>
          <button class="btn btn-primary" onclick="submitRecord()">➕ 지출 추가</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 지출 내역 ── -->
  <div class="tab-content" id="content-records">
    <div class="card">
      <div class="card-header">
        <div class="card-title">📋 지출 내역</div>
        <button class="btn btn-outline btn-sm" onclick="loadRecords()">🔄 새로고침</button>
      </div>
      <div class="card-body" style="padding:16px 24px;">
        <div class="filter-bar">
          <select id="filter-section" onchange="renderRecords()">
            <option value="">전체 세부사업</option>
            <option>과학교과활동</option>
            <option>[시보조]고교학점제 운영지원(학업경로설계)</option>
            <option>[자율]미래 역량 함양을 위한 다영역 창의·융합 통합 교육</option>
            <option>[목적]주도성을 키우는 교육과정 선도학교</option>
            <option>[목적]융합교육(STEAM) 클럽 운영</option>
          </select>
          <select id="filter-user" onchange="renderRecords()">
            <option value="">전체 담당자</option>
          </select>
          <input type="text" id="filter-search" placeholder="🔍 검색..." oninput="renderRecords()" style="min-width:160px;">
        </div>
        <div class="table-wrap">
          <table id="records-table">
            <thead>
              <tr>
                <th>날짜</th>
                <th>담당자</th>
                <th>사업</th>
                <th>산출내역</th>
                <th style="text-align:right">금액</th>
                <th>사용내역</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="records-tbody"></tbody>
          </table>
        </div>
        <div id="records-empty" class="empty-state" style="display:none;">
          <div class="empty-icon">📭</div>
          <p>입력된 지출 내역이 없습니다.</p>
        </div>
        <div id="records-total" style="text-align:right;padding:12px 4px 0;font-size:13px;color:var(--text-mid);"></div>
      </div>
    </div>
  </div>

  <!-- ── 예산 현황 ── -->
  <div class="tab-content" id="content-budget">
    <div class="summary-grid" id="summary-grid"></div>
    <div class="budget-sections" id="budget-sections"></div>
  </div>

  <!-- ── 참고사항 ── -->
  <div class="tab-content" id="content-ref">
    <div class="card">
      <div class="card-header">
        <div class="card-title">📑 세출예산집행현황목록 참고</div>
        <div style="font-size:12px;color:var(--text-light);">2026학년도 과학과 예산 원본</div>
      </div>
      <div class="card-body" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>세부사업 / 원가통계비목</th>
                <th>산출내역</th>

          <option value="">선택</option>
          <option>[시보조]고교학점제 운영지원(학업경로설계)</option>
          <option>[자율]미래 역량 함양을 위한 다영역 창의·융합 통합 교육</option>

        <label class="required">금액 (원)</label>
        <input type="number" id="edit-amount" min="0" step="1000">
      </div>

        <label class="required">담당자</label>

          <option value="">선택</option>

        <textarea id="edit-memo" style="min-height:60px;"></textarea>

      <button class="btn btn-outline" onclick="closeEditModal()">취소</button>
      <button class="btn btn-primary" onclick="confirmEdit()">💾 저장</button>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwlRGoq-jQxDTE2iBzVf1JKrQE0ahMeJa0yx5nUJLhRsNoKTwFZsLEVvlw77utmMq-QnA/exec';

const BUDGETS = {
  '과학교과활동': {
    color: 'blue', tag: 'tag-blue',
    users: ['김경호','김시원','권세진','김용조','강수현','변유진','이소정','박성진'],
    items: {
      '과학행사 운영': 3000000,
      '과학교과활동비': 2000000,
      '과학교구 구입': 5000000,
      '과학과 교재 제작': 4000000,
      '과학실험실습 재료 구입': 6000000
    }
  },
  '[시보조]고교학점제 운영지원(학업경로설계)': {
    color: 'orange', tag: 'tag-orange',
    users: ['김용조','김시원'],
    items: {
      '과학심화활동(전공심화활동) 강사비': 930000,
      '과학심화활동(전공심화활동) 재료비': 570000,
      '과학심화활동(전공심화활동) 간식비': 200000,
      '과학탐구실험 협력강사비': 8448000,
      '과학탐구실험 협력강사 4대보험료': 300000
    }
  },
  '[자율]미래 역량 함양을 위한 다영역 창의·융합 통합 교육': {
    color: 'teal', tag: 'tag-teal',
    users: ['김용조','김시원'],
    items: {
      '탐구체험 프로젝트 강사비': 1000000,
      '탐구체험 프로젝트 운영비': 6000000
    }
  },
  '[목적]주도성을 키우는 교육과정 선도학교': {
    color: 'green', tag: 'tag-green',
    users: ['김용조','김시원'],
    items: {
      '과학오픈클래스 강사수당': 1170000,
      '창의융합과학프로그램 운영비': 3000000,
      '과학오픈클래스 운영비': 130000
    }
  },
  '[목적]융합교육(STEAM) 클럽 운영': {
    color: 'purple', tag: 'tag-purple',
    users: ['김용조','김시원'],
    items: {
      '융합교육 클럽 초빙 강사수당': 400000,
      '융합교육 클럽 운영비': 1850000,
      '융합교육 클럽 협의회비': 250000
    }
  }
};

const ALL_USERS = ['김경호','김시원','권세진','김용조','강수현','변유진','이소정','박성진'];

let allRecords = [];
let deleteTarget = null;
let editTarget = null;

// ── 초기화 ──────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // 오늘 날짜 기본값
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
  // 담당자 필터 채우기
  const filterUser = document.getElementById('filter-user');
  ALL_USERS.forEach(u => {
    const o = document.createElement('option'); o.value = u; o.textContent = u;
    filterUser.appendChild(o);
  });
  loadRecords();
});

// ── 탭 전환 ──────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('content-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'budget') renderBudget();
  if (name === 'ref') renderRef();
  if (name === 'compare') ;
}

// ── 사업 선택 시 담당자·항목 업데이트 ─────────────────
function updateItems() {
  const section = document.getElementById('inp-section').value;
  const userSel = document.getElementById('inp-user');
  const itemSel = document.getElementById('inp-item');

  userSel.innerHTML = '<option value="">선택</option>';
  itemSel.innerHTML = '<option value="">선택</option>';

  if (!section || !BUDGETS[section]) return;
  const b = BUDGETS[section];
  b.users.forEach(u => {
    const o = document.createElement('option'); o.value = u; o.textContent = u;
    userSel.appendChild(o);
  });
  Object.keys(b.items).forEach(item => {
    const o = document.createElement('option'); o.value = item; o.textContent = item;
    itemSel.appendChild(o);
  });
}

// ── 폼 초기화 ─────────────────────────────────────────
function resetForm() {
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('inp-user').innerHTML = '<option value="">선택</option>';
  document.getElementById('inp-section').value = '';
  document.getElementById('inp-item').innerHTML = '<option value="">세부사업을 먼저 선택하세요</option>';
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-memo').value = '';
}

// ── 지출 추가 ─────────────────────────────────────────
async function submitRecord() {
  const date    = document.getElementById('inp-date').value;
  const user    = document.getElementById('inp-user').value;
  const section = document.getElementById('inp-section').value;
  const item    = document.getElementById('inp-item').value;
  const amount  = parseInt(document.getElementById('inp-amount').value) || 0;
  const memo    = document.getElementById('inp-memo').value.trim();

  if (!date || !user || !section || !item || !amount) {
    showToast('❗ 필수 항목을 모두 입력해주세요.', 'error'); return;
  }
  if (amount <= 0) {
    showToast('❗ 금액은 0보다 커야 합니다.', 'error'); return;
  }

  // 잔여예산 확인
  const spent = allRecords
    .filter(r => r['사업'] === section && r['항목'] === item)
    .reduce((s, r) => s + Number(r['금액']), 0);
  const budget = BUDGETS[section]?.items[item] || 0;
  if (spent + amount > budget) {
    const remain = budget - spent;
    showToast(`⚠️ 예산 초과! 잔여 ${fmt(remain)}원`, 'error'); return;
  }

  showLoading('저장 중...');
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addRecord', record: { '날짜': date, '담당자': user, '사업': section, '항목': item, '금액': amount, '사용내역': memo } })
    });
    const data = await res.json();
    if (data.success) {
      showToast('✅ 지출이 추가되었습니다!', 'success');
      resetForm();
      await loadRecords();
    } else { showToast('❌ 저장 실패', 'error'); }
  } catch(e) { showToast('❌ 서버 연결 오류', 'error'); }
  hideLoading();
}

// ── 데이터 로드 ───────────────────────────────────────
async function loadRecords() {
  setSyncStatus('loading');
  try {
    const res = await fetch(GAS_URL + '?action=getRecords');
    const data = await res.json();
    allRecords = data.records || [];
    renderRecords();
    renderBudget();
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}

// ── 내역 렌더 ─────────────────────────────────────────
function renderRecords() {
  const filterSection = document.getElementById('filter-section').value;
  const filterUser    = document.getElementById('filter-user').value;
  const search        = document.getElementById('filter-search').value.toLowerCase();

  let filtered = allRecords.filter(r => {
    if (filterSection && r['사업'] !== filterSection) return false;
    if (filterUser    && r['담당자'] !== filterUser) return false;
    if (search && !(
      (r['담당자']||'').toLowerCase().includes(search) ||
      (r['항목']||'').toLowerCase().includes(search) ||
      (r['사용내역']||'').toLowerCase().includes(search)
    )) return false;
    return true;
  });

  // 날짜 내림차순
  filtered.sort((a,b) => (b['날짜']||'').localeCompare(a['날짜']||''));
  // 날짜 포맷 정리 함수
  function fmtDate(d) {
    if (!d) return '';
    return d.toString().substring(0, 10);
  }

  const tbody = document.getElementById('records-tbody');
  const empty = document.getElementById('records-empty');
  const total = document.getElementById('records-total');

  tbody.innerHTML = '';
  if (!filtered.length) {
    empty.style.display = 'block';
    total.textContent = '';
    return;
  }
  empty.style.display = 'none';

  let sum = 0;
  filtered.forEach(r => {
    const amt = Number(r['금액']) || 0;
    sum += amt;
    const sec = r['사업'] || '';
    const tag = BUDGETS[sec]?.tag || 'tag-blue';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${fmtDate(r['날짜'])}</td>
      <td><strong>${r['담당자']||''}</strong></td>
      <td><span class="tag ${tag}">${sec}</span></td>
      <td>${r['항목']||''}</td>
      <td class="amount-cell">${fmt(amt)}원</td>
      <td style="color:var(--text-mid);max-width:200px;">${r['사용내역']||''}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="openEditModal(${r.rowIndex})" style="margin-right:4px;">✏️ 수정</button><button class="btn btn-danger btn-sm" onclick="openDeleteModal(${r.rowIndex})">🗑️ 삭제</button>
      </td>`;
    tbody.appendChild(tr);
  });

  total.innerHTML = `총 <strong>${filtered.length}건</strong> &nbsp;|&nbsp; 합계 <strong style="color:var(--navy)">${fmt(sum)}원</strong>`;
}

// ── 예산 현황 렌더 ────────────────────────────────────
function renderBudget() {
  let totalBudget = 0, totalSpent = 0;

  // 전체 지출 집계
  const spentMap = {};
  allRecords.forEach(r => {
    const key = r['사업'] + '||' + r['항목'];
    spentMap[key] = (spentMap[key] || 0) + (Number(r['금액']) || 0);
  });

  Object.values(BUDGETS).forEach(b => {
    Object.values(b.items).forEach(v => totalBudget += v);
  });
  Object.values(spentMap).forEach(v => totalSpent += v);
  const totalRemain = totalBudget - totalSpent;
  const totalPct = totalBudget ? (totalSpent / totalBudget * 100) : 0;

  // 요약 카드
  document.getElementById('summary-grid').innerHTML = `
    <div class="summary-card accent">
      <div class="summary-label">총 배정 예산</div>
      <div class="summary-value">${fmt(totalBudget)}<span style="font-size:14px;font-weight:400">원</span></div>
      <div class="summary-sub">4개 사업 합계</div>
    </div>
    <div class="summary-card blue">
      <div class="summary-label">총 지출</div>
      <div class="summary-value">${fmt(totalSpent)}<span style="font-size:14px;font-weight:400">원</span></div>
      <div class="summary-sub">집행률 ${totalPct.toFixed(1)}%</div>
    </div>
    <div class="summary-card green">
      <div class="summary-label">잔여 예산</div>
      <div class="summary-value ${totalRemain < 0 ? 'remain-negative' : 'remain-positive'}">${fmt(totalRemain)}<span style="font-size:14px;font-weight:400">원</span></div>
      <div class="summary-sub">${allRecords.length}건 지출 반영</div>
    </div>`;

  // 섹션별
  const sectionsEl = document.getElementById('budget-sections');
  sectionsEl.innerHTML = '';

  Object.entries(BUDGETS).forEach(([secName, secData]) => {
    let secBudget = 0, secSpent = 0;
    Object.values(secData.items).forEach(v => secBudget += v);
    Object.entries(secData.items).forEach(([item]) => {
      secSpent += (spentMap[secName+'||'+item] || 0);
    });
    const secRemain = secBudget - secSpent;
    const secPct = secBudget ? (secSpent / secBudget * 100) : 0;

    const rows = Object.entries(secData.items).map(([item, budget]) => {
      const spent = spentMap[secName+'||'+item] || 0;
      const remain = budget - spent;
      const pct = budget ? (spent / budget * 100) : 0;
      const fillClass = pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : '';
      return `<tr>
        <td>${item}</td>
        <td class="amount-cell">${fmt(budget)}</td>
        <td class="amount-cell">${fmt(spent)}</td>
        <td class="amount-cell ${remain < 0 ? 'remain-negative' : 'remain-positive'}">${fmt(remain)}</td>
        <td>
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill ${fillClass}" style="width:${Math.min(pct,100)}%"></div></div>
            <span class="pct-text">${pct.toFixed(1)}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');

    const div = document.createElement('div');
    div.innerHTML = `
      <div class="section-header ${secData.color}">
        <div class="section-name">📁 ${secName}</div>
        <div class="section-total">
          <span>배정 ${fmt(secBudget)}원</span>
          <span>지출 ${fmt(secSpent)}원</span>
          <span style="font-weight:700;">잔여 ${fmt(secRemain)}원 (${secPct.toFixed(1)}%)</span>
        </div>
      </div>
      <div class="budget-table">
        <table>
          <thead><tr>
            <th>산출내역</th>
            <th style="text-align:right">배정(원)</th>
            <th style="text-align:right">지출(원)</th>
            <th style="text-align:right">잔액(원)</th>
            <th>집행률</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    sectionsEl.appendChild(div);
  });
}

// ── 삭제 ──────────────────────────────────────────────
function openDeleteModal(rowIndex) {
  deleteTarget = rowIndex;
  document.getElementById('delete-modal').classList.add('open');
}
function closeDeleteModal() {
  deleteTarget = null;
  document.getElementById('delete-modal').classList.remove('open');
}
function openEditModal(rowIndex) {
  var r = allRecords.find(function(x){ return x.rowIndex === rowIndex; });
  if (!r) return;
  editTarget = rowIndex;
  document.getElementById('edit-date').value    = r['날짜'] || '';
  document.getElementById('edit-amount').value  = r['금액'] || '';
  document.getElementById('edit-memo').value    = r['사용내역'] || '';

  var secSel  = document.getElementById('edit-section');
  var itemSel = document.getElementById('edit-item');
  var userSel = document.getElementById('edit-user');

  secSel.value = r['사업'] || '';
  updateEditItems();

  // 항목·담당자 선택 (updateEditItems 후)
  setTimeout(function(){
    itemSel.value = r['항목'] || '';
    userSel.value = r['담당자'] || '';
  }, 50);

  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  editTarget = null;
  document.getElementById('edit-modal').classList.remove('open');
}

function updateEditItems() {
  var section = document.getElementById('edit-section').value;
  var itemSel = document.getElementById('edit-item');
  var userSel = document.getElementById('edit-user');
  itemSel.innerHTML = '<option value="">선택</option>';
  userSel.innerHTML = '<option value="">선택</option>';
  if (!section || !BUDGETS[section]) return;
  var b = BUDGETS[section];
  Object.keys(b.items).forEach(function(item){
    var o = document.createElement('option');
    o.value = item; o.textContent = item;
    itemSel.appendChild(o);
  });
  b.users.forEach(function(u){
    var o = document.createElement('option');
    o.value = u; o.textContent = u;
    userSel.appendChild(o);
  });
}

async function confirmEdit() {
  var date    = document.getElementById('edit-date').value;
  var section = document.getElementById('edit-section').value;
  var item    = document.getElementById('edit-item').value;
  var amount  = parseInt(document.getElementById('edit-amount').value) || 0;
  var user    = document.getElementById('edit-user').value;
  var memo    = document.getElementById('edit-memo').value.trim();

  if (!date || !user || !section || !item || !amount) {
    showToast('❗ 필수 항목을 모두 입력해주세요.', 'error'); return;
  }
  const target = editTarget;
  closeEditModal();
  editTarget = null;
  showLoading('수정 중...');
  try {
    var res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'updateRecord',
        rowIndex: target,
        record: {'날짜':date,'담당자':user,'사업':section,'항목':item,'금액':amount,'사용내역':memo}
      })
    });
    var data = await res.json();
    if (data.success) {
      allRecords = [];
      await loadRecords();
      showToast('✅ 수정되었습니다!', 'success');
    } else { showToast('❌ 수정 실패: ' + (data.error||''), 'error'); }
  } catch(e) { showToast('❌ 서버 연결 오류', 'error'); }
  hideLoading();
}

async function confirmDelete() {
  if (!deleteTarget) return;
  const target = deleteTarget;
  closeDeleteModal();
  deleteTarget = null;
  editTarget = null;
  showLoading('삭제 중...');
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'deleteRecord', rowIndex: target })
    });
    const data = await res.json();
    if (data.success) {
      allRecords = [];
      await loadRecords();
      showToast('🗑️ 삭제되었습니다.', 'success');
    } else { showToast('❌ 삭제 실패: ' + (data.error||''), 'error'); }
  } catch(e) { showToast('❌ 서버 연결 오류', 'error'); }
  hideLoading();
}

// ── 에듀파인 대조 ─────────────────────────────────────
function loadEduFile() {
  var file = document.getElementById('edu-file').files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, {type:'array'});
      var sheet = workbook.Sheets[workbook.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      parseAndCompare(rows);
    } catch(err) {
      showToast('❌ 파일 읽기 오류: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseAndCompare(rows) {
  // 에듀파인 데이터 파싱 - 산출내역(col1)과 원인행위액(col3) 추출
  var eduMap = {};
  rows.forEach(function(row) {
    var detail = (row[1] || '').toString().trim();
    var spent  = parseFloat((row[3] || '0').toString().replace(/,/g,'')) || 0;
    if (detail && spent > 0) {
      eduMap[detail] = (eduMap[detail] || 0) + spent;
    }
  });

  // 웹앱 데이터 집계 - 항목별 합계
  var webMap = {};
  allRecords.forEach(function(r) {
    var item = (r['항목'] || '').trim();
    var amt  = Number(r['금액']) || 0;
    if (item) webMap[item] = (webMap[item] || 0) + amt;
  });

  // 전체 항목 합치기
  var allItems = {};
  Object.keys(eduMap).forEach(function(k){ allItems[k] = true; });
  Object.keys(webMap).forEach(function(k){ allItems[k] = true; });

  // BUDGETS 기준으로 섹션별 정렬
  var resultBySec = {};
  Object.entries(BUDGETS).forEach(function(entry) {
    var secName = entry[0], secData = entry[1];
    var secRows = [];
    Object.keys(secData.items).forEach(function(item) {
      var edu = eduMap[item] || 0;
      var web = webMap[item] || 0;
      var budget = secData.items[item];
      var diff = edu - web;
      secRows.push({item:item, budget:budget, edu:edu, web:web, diff:diff});
      delete allItems[item];
    });
    resultBySec[secName] = {color: secData.color, rows: secRows};
  });

  // 매칭 안된 항목 (에듀파인에만 있거나 웹앱에만 있는)
  var unmatchedRows = [];
  Object.keys(allItems).forEach(function(item) {
    unmatchedRows.push({item:item, budget:0, edu:eduMap[item]||0, web:webMap[item]||0, diff:(eduMap[item]||0)-(webMap[item]||0)});
  });

  renderCompare(resultBySec, unmatchedRows);
}

function renderCompare(resultBySec, unmatchedRows) {
  var totalEdu = 0, totalWeb = 0, matchCount = 0, diffCount = 0;

  var sectionsHtml = '';
  Object.entries(resultBySec).forEach(function(entry) {
    var secName = entry[0], secData = entry[1];
    var rows = secData.rows;
    var secEdu = 0, secWeb = 0;
    rows.forEach(function(r){ secEdu += r.edu; secWeb += r.web; });
    totalEdu += secEdu; totalWeb += secWeb;

    var rowsHtml = rows.map(function(r) {
      var diff = r.edu - r.web;
      var status, statusBg, diffColor;
      if (r.edu === 0 && r.web === 0) {
        status = '⬜ 미집행'; statusBg = '#f8fafd'; diffColor = 'var(--text-light)';
      } else if (diff === 0) {
        status = '✅ 일치'; statusBg = '#f0faf4'; diffColor = 'var(--green)'; matchCount++;
      } else if (r.edu === 0) {
        status = '🟡 웹앱만'; statusBg = '#fffbea'; diffColor = '#b45309'; diffCount++;
      } else if (r.web === 0) {
        status = '🟠 에듀파인만'; statusBg = '#fff7ed'; diffColor = '#c55a11'; diffCount++;
      } else {
        status = '🔴 차이 있음'; statusBg = '#fff0ee'; diffColor = 'var(--red)'; diffCount++;
      }
      return '<tr style="background:' + statusBg + ';">' +
        '<td style="padding:10px 14px;">' + r.item + '</td>' +
        '<td style="text-align:right;padding:10px 14px;font-weight:600;">' + (r.budget>0?fmt(r.budget)+' 원':'-') + '</td>' +
        '<td style="text-align:right;padding:10px 14px;font-weight:600;color:var(--navy);">' + (r.edu>0?fmt(r.edu)+' 원':'-') + '</td>' +
        '<td style="text-align:right;padding:10px 14px;font-weight:600;color:var(--blue);">' + (r.web>0?fmt(r.web)+' 원':'-') + '</td>' +
        '<td style="text-align:right;padding:10px 14px;font-weight:700;color:' + diffColor + ';">' + (diff!==0?(diff>0?'+':'')+fmt(diff)+' 원':'0') + '</td>' +
        '<td style="padding:10px 14px;text-align:center;">' + status + '</td>' +
      '</tr>';
    }).join('');

    sectionsHtml += '<div style="margin-bottom:20px;">' +
      '<div class="section-header ' + secData.color + '" style="border-radius:10px 10px 0 0;">' +
        '<div class="section-name">📁 ' + secName + '</div>' +
        '<div class="section-total">' +
          '<span>에듀파인 ' + fmt(secEdu) + '원</span>' +
          '<span>웹앱 ' + fmt(secWeb) + '원</span>' +
          '<span style="font-weight:700;">차이 ' + fmt(secEdu-secWeb) + '원</span>' +
        '</div>' +
      '</div>' +
      '<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;">' +
        '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
          '<thead><tr>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;">산출내역</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:right;">배정예산</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:right;">에듀파인 집행액</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:right;">웹앱 합계</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:right;">차이</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:center;">상태</th>' +
          '</tr></thead>' +
          '<tbody>' + rowsHtml + '</tbody>' +
        '</table>' +
      '</div>' +
    '</div>';
  });

  // 매칭 안된 항목
  if (unmatchedRows.length > 0) {
    var uRowsHtml = unmatchedRows.map(function(r) {
      return '<tr style="background:#fff7ed;">' +
        '<td style="padding:10px 14px;color:#c55a11;">' + r.item + '</td>' +
        '<td style="text-align:right;padding:10px 14px;">-</td>' +
        '<td style="text-align:right;padding:10px 14px;">' + (r.edu>0?fmt(r.edu)+' 원':'-') + '</td>' +
        '<td style="text-align:right;padding:10px 14px;">' + (r.web>0?fmt(r.web)+' 원':'-') + '</td>' +
        '<td style="text-align:right;padding:10px 14px;color:#c55a11;">미매칭</td>' +
        '<td style="text-align:center;padding:10px 14px;">⚠️ 항목 불일치</td>' +
      '</tr>';
    }).join('');
    sectionsHtml += '<div style="margin-bottom:20px;">' +
      '<div style="background:#c55a11;color:white;padding:14px 20px;border-radius:10px 10px 0 0;font-weight:700;">⚠️ 매칭 안된 항목</div>' +
      '<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;">' +
        '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
          '<thead><tr>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;">산출내역</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:right;">배정예산</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:right;">에듀파인 집행액</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:right;">웹앱 합계</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:right;">차이</th>' +
            '<th style="background:#2a3f5e;color:white;padding:9px 14px;font-size:11px;text-align:center;">상태</th>' +
          '</tr></thead>' +
          '<tbody>' + uRowsHtml + '</tbody>' +
        '</table>' +
      '</div>' +
    '</div>';
  }

  // 요약
  var totalDiff = totalEdu - totalWeb;
  var summaryHtml = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:4px;">' +
    '<div class="summary-card accent"><div class="summary-label">에듀파인 총 집행액</div><div class="summary-value" style="font-size:18px;">' + fmt(totalEdu) + '<span style="font-size:12px;">원</span></div></div>' +
    '<div class="summary-card blue"><div class="summary-label">웹앱 총 합계</div><div class="summary-value" style="font-size:18px;">' + fmt(totalWeb) + '<span style="font-size:12px;">원</span></div></div>' +
    '<div class="summary-card ' + (totalDiff===0?'green':'') + '" style="border-left:4px solid ' + (totalDiff===0?'var(--green)':'var(--red)') + '"><div class="summary-label">총 차이</div><div class="summary-value" style="font-size:18px;color:' + (totalDiff===0?'var(--green)':'var(--red)') + ';">' + (totalDiff>=0?'+':'') + fmt(totalDiff) + '<span style="font-size:12px;">원</span></div></div>' +
    '<div class="summary-card" style="border-left:4px solid var(--blue)"><div class="summary-label">항목 일치 / 차이</div><div class="summary-value" style="font-size:18px;"><span style="color:var(--green);">' + matchCount + '</span> / <span style="color:var(--red);">' + diffCount + '</span></div></div>' +
  '</div>';

  document.getElementById('compare-summary').innerHTML = summaryHtml;
  document.getElementById('compare-result').innerHTML = sectionsHtml;
}

// ── 유틸 ──────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString('ko-KR'); }

function showLoading(msg='처리 중...') {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setSyncStatus(status) {
  const dot  = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if (status === 'ok') {
    dot.style.background = '#4ade80';
    text.textContent = '동기화됨';
  } else if (status === 'loading') {
    dot.style.background = '#facc15';
    text.textContent = '동기화 중...';
  } else {
    dot.style.background = '#f87171';
    text.textContent = '연결 오류';
  }
}
